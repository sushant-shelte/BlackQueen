# This file configures your services on Render.
# To use this file, go to your service's settings on the Render dashboard,
# navigate to the "Infrastructure as Code" section, and connect your Git repository.
# Render will then use this file for all subsequent deployments.

services:
  - type: web
    name: black-queen-backend
    env: python
    region: oregon # Or your preferred region, e.g., frankfurt
    plan: free # Or your preferred plan
    
    # === Build Configuration ===
    # Specifies the command to install dependencies.
    buildCommand: "pip install -r backend/requirements.txt"
    
    # === Start Command ===
    # The command to run your application.
    startCommand: "python backend/run.py"
    
    # === Environment Variables ===
    # Sets environment variables for the build and runtime.
    envVars:
      # CRITICAL: This tells cargo (the Rust build tool used by a dependency)
      # to use a writable directory, fixing the "Read-only file system" error.
      - key: CARGO_HOME
        value: /tmp/cargo_home
        
      # CRITICAL: This forces Render to use the correct, stable Python version,
      # fixing the build script failure with pydantic-core.
      - key: PYTHON_VERSION
        value: 3.12.8
